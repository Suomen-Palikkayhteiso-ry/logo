# Deploy elm-pages site to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: devenv shell bash -- -e {0}
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv.sh
        shell: bash
        run: nix profile add nixpkgs#devenv

      # ── Caches ──────────────────────────────────────────────────────────────

      # Haskell compiled artifacts. Keyed on cabal files + devenv.lock so a
      # different GHC (after devenv update) always gets a fresh build.
      - uses: actions/cache@v5
        with:
          path: dist-newstyle
          key: cabal-${{ runner.os }}-${{ hashFiles('logo.cabal', 'cabal.project', 'devenv.lock') }}-${{ hashFiles('src/**/*.hs', 'app/**/*.hs') }}
          restore-keys: cabal-${{ runner.os }}-${{ hashFiles('logo.cabal', 'cabal.project', 'devenv.lock') }}-

      # Generated pipeline outputs (logos, favicons, JSON/JSON-LD, Elm tokens).
      # If this hits we touch logo/.stamp so make skips logo-gen entirely.
      - uses: actions/cache@v5
        id: pipeline-cache
        with:
          path: |
            logo
            favicon
            design-guide.json
            design-guide
            src/Brand/Tokens.elm
          key: pipeline-${{ runner.os }}-${{ hashFiles('source.svg', 'fonts/Outfit-VariableFont_wght.ttf', 'src/**/*.hs', 'app/**/*.hs', 'logo.cabal', 'cabal.project', 'Makefile') }}

      - name: Refresh pipeline stamp after cache restore
        if: steps.pipeline-cache.outputs.cache-hit == 'true'
        shell: bash
        run: touch logo/.stamp

      # npm packages + compiled Elm packages
      - uses: actions/cache@v5
        with:
          path: |
            node_modules
            elm-stuff
          key: npm-elm-${{ runner.os }}-${{ hashFiles('package-lock.json', 'elm.json') }}
          restore-keys: npm-elm-${{ runner.os }}-

      # ── Build ────────────────────────────────────────────────────────────────

      - name: Build devenv shell
        run: echo "devenv shell ready"

      - name: Run Haskell pipeline and copy assets
        run: make assets

      - name: Install npm dependencies
        run: npm install

      - name: Build elm-pages site
        run: npx elm-pages build

      # ── Deploy ───────────────────────────────────────────────────────────────

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
