name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install image tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y librsvg2-bin webp icoutils imagemagick
          sudo ln -sf /usr/bin/convert /usr/local/bin/magick

      - name: Install gifski
        run: |
          curl -fsSL -o gifski.tar.xz \
            https://github.com/ImageOptim/gifski/releases/download/1.34.0/gifski-1.34.0.tar.xz
          tar -xf gifski.tar.xz linux/gifski
          sudo install -m755 linux/gifski /usr/local/bin/gifski

      - name: Install fonttools
        run: pip install fonttools

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6'
          cabal-version: 'latest'

      # ── Cabal package index cache (daily) ────────────────────────────────────

      - id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ~/.cabal/packages
          key: cabal-index-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: cabal-index-${{ runner.os }}-

      - run: cabal update

      # ── Cabal layered caches ──────────────────────────────────────────────────

      # Layer 1 — pre-compiled deps (most valuable)
      - uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: cabal-store-${{ runner.os }}-ghc9.6-${{ hashFiles('logo.cabal', 'cabal.project') }}
          restore-keys: cabal-store-${{ runner.os }}-ghc9.6-

      # Layer 2 — compiled project objects
      - uses: actions/cache@v4
        with:
          path: dist-newstyle
          key: cabal-dist-${{ runner.os }}-ghc9.6-${{ hashFiles('logo.cabal', 'cabal.project') }}-${{ hashFiles('src/**/*.hs', 'app/**/*.hs') }}
          restore-keys: |
            cabal-dist-${{ runner.os }}-ghc9.6-${{ hashFiles('logo.cabal', 'cabal.project') }}-
            cabal-dist-${{ runner.os }}-ghc9.6-

      # ── Pipeline output cache ─────────────────────────────────────────────────

      # Generated pipeline outputs (logos, favicons, JSON/JSON-LD, Elm tokens).
      # Makefile intentionally excluded from the key: Makefile edits should not
      # invalidate rendered logo assets.
      - uses: actions/cache@v4
        id: pipeline-cache
        with:
          path: |
            logo/
            favicon/
            design-guide.json
            design-guide/
            src/Brand/Tokens.elm
          key: pipeline-${{ runner.os }}-${{ hashFiles('layout/*.blay', 'fonts/*.ttf', 'src/**/*.hs', 'app/**/*.hs') }}

      - name: Touch pipeline outputs after cache restore
        if: steps.pipeline-cache.outputs.cache-hit == 'true'
        run: |
          find logo favicon design-guide -type f -exec touch {} + 2>/dev/null || true
          touch design-guide.json src/Brand/Tokens.elm 2>/dev/null || true

      # ── Node / Elm caches ─────────────────────────────────────────────────────

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.elm
            elm-stuff
            .elm-pages
          key: elm-${{ runner.os }}-${{ hashFiles('elm.json', 'package.json') }}
          restore-keys: elm-${{ runner.os }}-

      # ── Build ─────────────────────────────────────────────────────────────────

      - name: Run tests
        run: cabal test

      - name: Run Haskell pipeline and copy assets
        run: make assets-from-blay

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Build elm-pages site
        run: pnpm exec elm-pages build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/smoke-test.sh
        env:
          SITE_URL: ${{ needs.deploy.outputs.page_url }}
