# Typography tokens — font family, type scale, and usage rules.
# Conforms to W3C Design Tokens 2025.10 when processed by brand-gen.

[typography]
font-family = ["Outfit", "system-ui", "sans-serif"]
font-file = "fonts/Outfit-VariableFont_wght.ttf"
font-license = "OFL-1.1"
font-license-file = "fonts/OFL.txt"

usage-rules = [
  "Use the Outfit font exclusively; never substitute a system font in designed output.",
  "Minimum body text size is 16px (1rem) at weight 400.",
  "Minimum caption/label text size is 14px (0.875rem); use weight 500 or higher for readability.",
  "Maximum recommended line length is 75 characters for body text.",
  "Heading hierarchy must descend: Display > H1 > H2 > H3 > H4. Do not skip levels.",
  "Code and monospace content should use font-family: monospace as a fallback.",
]

[[typography.scale]]
name = "Display"
weight = 700
size-rem = 3.0
size-px = 48
line-height = 1.1
letter-spacing-em = -0.02
css-class = "type-display"
description = "Hero headlines and landing-page titles only."

[[typography.scale]]
name = "Heading1"
weight = 700
size-rem = 1.875
size-px = 30
line-height = 1.2
letter-spacing-em = -0.01
css-class = "type-h1"
description = "Page-level headings (one per page)."

[[typography.scale]]
name = "Heading2"
weight = 700
size-rem = 1.5
size-px = 24
line-height = 1.3
letter-spacing-em = 0.0
css-class = "type-h2"
description = "Section headings."

[[typography.scale]]
name = "Heading3"
weight = 600
size-rem = 1.25
size-px = 20
line-height = 1.35
letter-spacing-em = 0.0
css-class = "type-h3"
description = "Sub-section headings."

[[typography.scale]]
name = "Heading4"
weight = 600
size-rem = 1.125
size-px = 18
line-height = 1.4
letter-spacing-em = 0.0
css-class = "type-h4"
description = "Card and widget headings. Use below Heading3."

[[typography.scale]]
name = "Body"
weight = 400
size-rem = 1.0
size-px = 16
line-height = 1.6
letter-spacing-em = 0.0
css-class = "type-body"
description = "Default body copy. Minimum size for accessible reading."

[[typography.scale]]
name = "BodySmall"
weight = 500
size-rem = 0.875
size-px = 14
line-height = 1.5
letter-spacing-em = 0.0
css-class = "type-body-small"
description = "Secondary labels, UI controls, and form hints."

[[typography.scale]]
name = "Caption"
weight = 400
size-rem = 0.875
size-px = 14
line-height = 1.4
letter-spacing-em = 0.02
css-class = "type-caption"
description = "Image captions, footnotes, and metadata."

[[typography.scale]]
name = "Mono"
weight = 400
size-rem = 0.875
size-px = 14
line-height = 1.6
letter-spacing-em = 0.0
css-class = "type-mono"
description = "Hex values, IDs, and code snippets."

[[typography.scale]]
name = "Overline"
weight = 600
size-rem = 0.75
size-px = 12
line-height = 1.4
letter-spacing-em = 0.08
css-class = "type-overline"
description = "Section category labels. Always uppercase."
