<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Stud on top -->
  <rect x="75" y="0" width="50" height="22" fill="#05131D"/>
  <!-- Head body -->
  <rect x="10" y="22" width="180" height="168" rx="20" fill="#05131D"/>
  <!-- Left eyebrow -->
  <rect x="28" y="68" width="48" height="14" fill="#FFFFFF"/>
  <!-- Right eyebrow -->
  <rect x="124" y="68" width="48" height="14" fill="#FFFFFF"/>
  <!-- Left eye (black oval) -->
  <ellipse cx="65" cy="108" rx="22" ry="27" fill="#FFFFFF"/>
  <!-- Right eye (black oval) -->
  <ellipse cx="135" cy="108" rx="22" ry="27" fill="#FFFFFF"/>
  <!-- Left eye highlight -->
  <ellipse cx="74" cy="96" rx="10" ry="10" fill="#05131D"/>
  <!-- Right eye highlight -->
  <ellipse cx="144" cy="96" rx="10" ry="10" fill="#05131D"/>
  <!-- Smile (quadratic bezier arc) -->
  <path d="M 60,148 Q 100,175 140,148"
        stroke="#FFFFFF" stroke-width="16"
        fill="none" stroke-linecap="round"/>
</svg>
