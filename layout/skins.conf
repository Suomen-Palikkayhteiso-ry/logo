# blay-compose skin configuration
#
# Maps each master blay (first to fourth) to an output stem and face colour.
# One entry per line (in master order): output-stem  RRGGBB
# Lines starting with # are comments; blank lines are ignored.
#
# The face colour replaces the yellow placeholder (#F2CD37) in each master
# before writing the derived square .blay file.
#
# To switch all variants to yellow, change all hex values to F2CD37.
# To rename outputs, change the stem (and update src/Brand/Logos.elm).
#
square              F2CD37
square-light-nougat F6D7B3
square-nougat       D09168
square-dark-nougat  AD6140
